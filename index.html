<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logica JS -1-</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="contenedor-principal">
        <h1>Ejercicio de Logica de Progamación</h1>
        <div id="contenedor-box-ingreso">
            <h2>Los numeros ingresados son:</h2>
            <div id="box-ingreso">
                <h3><span id="num1">0</span></h3>
                <h3><span id="num2">0</span></h3>
                <h3><span id="num3">0</span></h3>
            </div>
        </div>
        <div id="contenedor-box-salida">
            <h2>Salida: </h2>
            <div id="box-salida">
                <h3>
                    <p>Mayor a menor: </p>
                </h3>
                <div id="mayor-menor">
                    <h3><span class="numMayor num-mayor">0</span></h3>
                    <h3><span class="numCentro num-centro">0</span></h3>
                    <h3><span class="numMenor num-menor">0</span></h3>
                </div>
                <h3>
                    <p>Menor a mayor: </p>
                </h3>
                <div id="menor-mayor">
                    <h3><span class="numMenor1 num-menor">0</span></h3>
                    <h3><span class="numCentro1 num-centro">0</span></h3>
                    <h3><span class="numMayor1 num-mayor">0</span></h3>
                </div>
            </div>
        </div>
        <div id="son-iguales">
            <p id="sonIguales"></p>
        </div>
    </div>


    <script src="app.js"></script>
</body>

</html>
